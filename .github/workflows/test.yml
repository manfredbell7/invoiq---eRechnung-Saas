name: invoiq CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    continue-on-error: true  # Tests blockieren nicht den Deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Dependencies installieren
        working-directory: backend
        run: npm install

      - name: Tests ausführen
        working-directory: backend
        run: node --test tests/api.test.js || true
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-min-32-chars-invoiq-ci
          PORT: "3001"

  build-check:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Dependencies installieren
        working-directory: frontend
        run: npm install

      - name: Build prüfen
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: https://invoiq-erechnung-saas-production.up.railway.app
