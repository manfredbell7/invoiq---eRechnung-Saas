<html lang="de">
<head>

<!-- PWA -->

<!-- iOS PWA Support -->
<meta name="apple-mobile-web-app-capable" content="yes" />

<!-- Favicons -->

<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

<!-- Open Graph -->
<meta property="og:title" content="invoiq — E-Rechnung Platform" />
<meta property="og:description" content="E-Rechnungen empfangen, erstellen und versenden — ohne IT-Aufwand." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://invoiq.io" />
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
<script>
  // Service Worker registrieren (PWA) mit Auto-Update
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').then((reg) => {
        // Bei jedem Laden aktiv nach neuer Version suchen
        reg.update();
        // Wenn ein neuer SW die Kontrolle übernimmt: Seite einmal neu laden
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });
        // Neu gefundenen SW sofort aktivieren lassen
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (nw) nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              nw.postMessage && nw.postMessage('skipWaiting');
            }
          });
        });
      }).catch(() => {});
    });
  }
</script>
</body>
</html>
