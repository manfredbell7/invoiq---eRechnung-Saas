<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
<script>
  // SERVICE WORKER KILL-SWITCH
  // Entfernt jeden zuvor installierten Service Worker und löscht alle Caches.
  // Notwendig damit veraltete JS-Bundles nicht mehr ausgeliefert werden.
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then((regs) => {
      let hadSW = regs.length > 0;
      Promise.all(regs.map((r) => r.unregister())).then(() => {
        if ('caches' in window) {
          caches.keys().then((keys) => {
            Promise.all(keys.map((k) => caches.delete(k))).then(() => {
              // Wenn ein alter SW aktiv war: einmal hart neu laden, damit
              // das frische Bundle direkt vom Netzwerk kommt.
              if (hadSW) window.location.reload();
            });
          });
        } else if (hadSW) {
          window.location.reload();
        }
      });
    }).catch(() => {});
  }
</script>
